<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            padding: 30px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s ease;
            background: none;
            border: none;
            font-size: 16px;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #5a6fd8;
        }

        .forgot-password {
            display: block;
            text-align: right;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .message {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="showForm('login')">Вход</button>
            <button class="tab" onclick="showForm('register')">Регистрация</button>
        </div>

        <!-- Форма входа -->
        <div id="login-form" class="form active">
            <h2>Вход</h2>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required placeholder="Введите email">
                </div>
                <div class="form-group">
                    <label for="login-password">Пароль</label>
                    <input type="password" id="login-password" required placeholder="Введите пароль">
                    <a href="#" class="forgot-password">Забыли пароль?</a>
                </div>
                <button type="submit" class="btn">Войти</button>
            </form>
            <div id="login-message" class="message"></div>
        </div>

        <!-- Форма регистрации -->
        <div id="register-form" class="form">
            <h2>Регистрация</h2>
            <form id="registerForm" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label for="register-name">Имя пользователя</label>
                    <input type="text" id="register-name" required placeholder="Введите имя">
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" required placeholder="Введите email">
                </div>
                <div class="form-group">
                    <label for="register-password">Пароль</label>
                    <input type="password" id="register-password" required placeholder="Придумайте пароль">
                </div>
                <div class="form-group">
                    <label for="register-confirm-password">Подтверждение пароля</label>
                    <input type="password" id="register-confirm-password" required placeholder="Повторите пароль">
                </div>
                <div class="password-requirements">
                    * Пароль должен содержать минимум 8 символов
                </div>
                <button type="submit" class="btn">Зарегистрироваться</button>
            </form>
            <div id="register-message" class="message"></div>
        </div>
    </div>

    <script>
        function showForm(formType) {
            // Обновление активной вкладки
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // Переключение формы
            document.getElementById('login-form').classList.remove('active');
            document.getElementById('register-form').classList.remove('active');
            
            if (formType === 'login') {
                document.getElementById('login-form').classList.add('active');
            } else {
                document.getElementById('register-form').classList.add('active');
            }

            // Скрыть сообщения при переключении
            document.getElementById('login-message').style.display = 'none';
            document.getElementById('register-message').style.display = 'none';
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const messageDiv = document.getElementById('login-message');

            // Простая валидация
            if (!email || !password) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Пожалуйста, заполните все поля';
                return false;
            }

            // Демонстрационное сообщение
            messageDiv.className = 'message success';
            messageDiv.textContent = 'Вход выполнен успешно! (демо-режим)';
            return false;
        }

        function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            const messageDiv = document.getElementById('register-message');

            // Проверка заполнения всех полей
            if (!name || !email || !password || !confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Пожалуйста, заполните все поля';
                return false;
            }

            // Проверка длины пароля
            if (password.length < 8) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Пароль должен содержать минимум 8 символов';
                return false;
            }

            // Проверка совпадения паролей
            if (password !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Пароли не совпадают';
                return false;
            }

            // Проверка email
            if (!email.includes('@') || !email.includes('.')) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Введите корректный email';
                return false;
            }

            // Демонстрационное сообщение
            messageDiv.className = 'message success';
            messageDiv.textContent = 'Регистрация успешна! (демо-режим)';
            return false;
        }
    </script>
</body>
</html>
